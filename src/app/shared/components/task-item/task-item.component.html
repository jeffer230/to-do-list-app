<!-- Agregamos #slidingItem como referencia local -->
<ion-item-sliding #slidingItem>
  <ion-item>
    <ion-checkbox slot="start" [checked]="task.isCompleted" (ionChange)="onToggle()"></ion-checkbox>

    <ion-label>
      <h2 [class.completed-text]="task.isCompleted">{{ task.title }}</h2>

      @if (task.description) {
        <p>{{ task.description }}</p>
      }

      <!-- Mostramos la etiqueta de la categoría con su respectivo color -->
      @if (task.category) {
        <ion-badge [style.--background]="task.category.color">
          {{ task.category.name }}
        </ion-badge>
      }

    </ion-label>
  </ion-item>

  <ion-item-options side="end">
    <!-- Pasamos el slidingItem a la función -->
    <ion-item-option color="danger" (click)="onDelete(slidingItem)">
      Eliminar
    </ion-item-option>
  </ion-item-options>
</ion-item-sliding>
